# GitLab CI/CD 配置
# 自动构建、测试和发布

stages:
  - check
  - build
  - test
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTUP_HOME: ${CI_PROJECT_DIR}/.rustup

# 缓存 Cargo 依赖
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/
    - target/

# 代码检查
check:
  stage: check
  image: rustlang/rust:nightly
  script:
    - rustup component add clippy rustfmt
    - cargo fmt --all -- --check
    - cargo clippy --workspace -- -D warnings
  only:
    - merge_requests
    - main
    - develop

# 构建
build:
  stage: build
  image: rustlang/rust:nightly
  before_script:
    - rustup target add wasm32-unknown-unknown
    - cargo install cargo-leptos
  script:
    - cargo leptos build --release
  artifacts:
    paths:
      - target/release/server
      - target/site/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - tags

# 测试
test:
  stage: test
  image: rustlang/rust:nightly
  script:
    - cargo test --workspace
  only:
    - merge_requests
    - main
    - develop

# 发布（仅在 tag 时触发）
release:
  stage: release
  image: rustlang/rust:nightly
  dependencies:
    - build
  script:
    - |
      VERSION=${CI_COMMIT_TAG#v}
      echo "Creating release for version: $VERSION"
      mkdir -p release/collector
      cp target/release/server release/collector/
      cp -r target/site release/collector/target/
      cp -r config release/collector/
      cp run_server.sh release/collector/
      echo "$CI_COMMIT_TAG" > release/collector/VERSION
      cd release && tar -czvf collector-${VERSION}.tar.gz collector
  artifacts:
    paths:
      - release/*.tar.gz
    expire_in: 1 month
  only:
    - tags
  when: manual
